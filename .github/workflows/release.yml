name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build, Pack & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Derive version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore tactile-cs.slnx

      - name: Build (Release)
        run: dotnet build tactile-cs.slnx --no-restore -c Release -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test tactile-cs.slnx --no-build -c Release

      - name: Pack
        run: |
          dotnet pack TactileCs.csproj \
            --no-build \
            -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o ./nupkg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./nupkg/*.nupkg
          generate_release_notes: true
          body_path: CHANGELOG.md

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
